<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Game 1 — Sam & Jack Key Read Reaction Trainer</title>

  <style>
    :root {
      --bg: #07111f;
      --panel: #101b2d;
      --field: #1a2435;
      --line: rgba(255,255,255,0.16);
      --text: #f8fafc;
      --muted: #b8c4d6;
      --accent: #ff7a18;
      --green: #33d17a;
      --red: #ef4444;
      --blue: #4da3ff;
      --yellow: #ffd166;
      --purple: #c084fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #081120, #050913);
      color: var(--text);
    }

    .wrap {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 36px;
    }

    header {
      text-align: center;
      margin-bottom: 16px;
    }

    .kicker {
      color: var(--yellow);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    h1 {
      margin: 8px 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
    }

    .sub {
      margin: 0 auto;
      max-width: 900px;
      color: var(--muted);
      line-height: 1.45;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 12px;
      font-weight: 800;
    }

    .field {
      position: relative;
      height: 560px;
      border-radius: 18px;
      background:
        linear-gradient(90deg, transparent 49.7%, rgba(255,255,255,0.14) 50%, transparent 50.3%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        var(--field);
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 16px 45px rgba(0,0,0,0.28);
    }

    .los {
      position: absolute;
      left: 70px;
      right: 70px;
      top: 260px;
      border-top: 3px solid rgba(255,255,255,0.24);
    }

    .hash {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255,255,255,0.08);
    }

    .hash.left {
      left: 33%;
    }

    .hash.right {
      right: 33%;
    }

    .player {
      position: absolute;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 900;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.78);
      z-index: 8;
    }

    .off {
      background: var(--red);
      color: white;
    }

    .def {
      background: var(--green);
      color: #04130a;
    }

    .focus {
      outline: 4px solid var(--yellow);
      box-shadow: 0 0 20px rgba(255,209,102,0.75);
    }

    .front-title {
      position: absolute;
      left: 22px;
      top: 18px;
      font-weight: 900;
      color: white;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 10;
    }

    .strength {
      position: absolute;
      right: 22px;
      top: 18px;
      font-weight: 900;
      color: var(--yellow);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 10;
    }

    .tag {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 900;
      text-align: center;
      z-index: 9;
      white-space: nowrap;
    }

    .read-label {
      position: absolute;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(0,0,0,0.52);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      font-size: 0.72rem;
      font-weight: 900;
      transform: translate(-50%, -50%);
      z-index: 12;
      white-space: nowrap;
    }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .off-line {
      stroke: var(--red);
      stroke-width: 5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrowRed);
    }

    .def-blue {
      stroke: var(--blue);
      stroke-width: 5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrowBlue);
    }

    .def-green {
      stroke: var(--green);
      stroke-width: 5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrowGreen);
    }

    .def-yellow {
      stroke: var(--yellow);
      stroke-width: 5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrowYellow);
    }

    .ball-line {
      stroke: var(--purple);
      stroke-width: 5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrowPurple);
      stroke-dasharray: 8 7;
    }

    .question-card {
      margin-top: 16px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.055);
      text-align: center;
    }

    .scenario-title {
      color: var(--yellow);
      font-weight: 900;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .question {
      font-size: 1.16rem;
      font-weight: 900;
      margin-bottom: 14px;
      line-height: 1.35;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 980px;
      margin: 0 auto;
    }

    button {
      min-height: 64px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      background: #34495e;
      color: white;
      font-weight: 900;
      cursor: pointer;
      font-size: 0.94rem;
      line-height: 1.25;
      padding: 10px;
    }

    button:hover {
      filter: brightness(1.12);
    }

    .feedback {
      min-height: 72px;
      margin-top: 14px;
      font-size: 1rem;
      font-weight: 800;
      color: var(--muted);
      line-height: 1.45;
    }

    .correct {
      color: var(--green);
    }

    .incorrect {
      color: #ff8a8a;
    }

    .complete {
      margin-top: 16px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(51,209,122,0.12);
      border: 1px solid rgba(51,209,122,0.35);
      display: none;
      text-align: center;
    }

    @media (max-width: 760px) {
      .field {
        height: 500px;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .player {
        width: 36px;
        height: 36px;
        font-size: 0.64rem;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header>
      <div class="kicker">Legend Mastery Series • Sam & Jack Trainer</div>
      <h1>Game 1 — Key Read Reaction Trainer</h1>
      <p class="sub">
        Read the play, identify the key action, and choose the correct Sam or Jack reaction.
        Blue/green/yellow lines show defensive reaction. Red lines show offensive key movement.
      </p>
    </header>

    <section class="hud">
      <div>Question: <span id="qNum">1</span>/<span id="qTotal">10</span></div>
      <div>Accuracy: <span id="accuracy">100</span>%</div>
    </section>

    <section class="field" id="field">
      <div class="front-title" id="frontTitle"></div>
      <div class="strength" id="strengthTitle"></div>
      <div class="hash left"></div>
      <div class="hash right"></div>
      <div class="los"></div>

      <svg id="movementLayer" viewBox="0 0 1180 560" preserveAspectRatio="none">
        <defs>
          <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"></path>
          </marker>
          <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#4da3ff"></path>
          </marker>
          <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#33d17a"></path>
          </marker>
          <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#ffd166"></path>
          </marker>
          <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#c084fc"></path>
          </marker>
        </defs>
      </svg>
    </section>

    <section class="question-card">
      <div class="scenario-title" id="scenarioTitle"></div>
      <div class="question" id="questionText"></div>

      <div class="choices" id="choices"></div>

      <div class="feedback" id="feedback"></div>
    </section>

    <section class="complete" id="completeBox">
      <h2>Game Complete</h2>
      <p id="finalScore"></p>
      <button onclick="restartGame()">Restart Game</button>
    </section>

  </div>

  <script>
    const field = document.getElementById("field");
    const svg = document.getElementById("movementLayer");

    const scenarios = [
      {
        id: "under-power-to-jack",
        front: "UNDER",
        strength: "RIP — Strength Right",
        title: "Under Rip — Power Weak to Jack",
        focus: "Jack",
        correct: "spillB",
        question: "Jack gets down block with a pulling guard coming to him. What is Jack’s full reaction?",
        explanation: "Correct. Jack is on the LOS in a weak 5-tech. He plays this like the End: flatten down the line, wrong-arm/spill the puller, close the window, then turn vertical in the B-gap.",
        choices: [
          { id: "spillB", text: "Flatten down the line, wrong-arm/spill the puller, then turn vertical in B-gap." },
          { id: "boxEdge", text: "Box the puller outside and stay wide in contain." },
          { id: "cutback", text: "Shuffle slowly for cutback because the ball is away." },
          { id: "coverage", text: "Open to #2 and carry vertical because it is high hat." }
        ],
        draw: drawUnderPowerToJack
      },
      {
        id: "under-power-away-from-sam",
        front: "UNDER",
        strength: "RIP — Strength Right",
        title: "Under Rip — Power Weak Away From Sam",
        focus: "Sam",
        correct: "cutback",
        question: "On the opposite side of Power Weak, Sam gets a gap-hinge/base look. What is Sam’s reaction?",
        explanation: "Correct. Sam takes his read steps, treats the gap-hinge/base like base pressure, stays square, then works into cutback responsibility after confirming the ball is away.",
        choices: [
          { id: "cutback", text: "Take read steps, handle the base/gap-hinge look, then work into cutback after ball away." },
          { id: "spillB", text: "Wrong-arm the puller and turn vertical into B-gap." },
          { id: "highhat", text: "Open to #2 and wall #2 to 10–12 yards." },
          { id: "chaseGive", text: "Chase the running back immediately across the formation." }
        ],
        draw: drawUnderPowerToJack
      },
      {
        id: "okie-power-to-sam",
        front: "OKIE",
        strength: "LIZ — Strength Left",
        title: "Okie Liz — Power Strong to Sam",
        focus: "Sam",
        correct: "box",
        question: "Okie Power Strong is coming to Sam off the ball. He gets down/puller action. What is Sam’s reaction?",
        explanation: "Correct. Off-ball Sam wins the race to the leverage point, sets the edge tightly, boxes the kickout, keeps outside arm free, and forces the ball back inside.",
        choices: [
          { id: "box", text: "Win to the leverage point, box the kickout, keep outside arm free, and force ball inside." },
          { id: "spill", text: "Wrong-arm through the puller like an on-the-line 5-tech." },
          { id: "drop", text: "Open to #2 because this is automatically pass." },
          { id: "late", text: "Wait for the puller to come to you before setting the edge." }
        ],
        draw: drawOkiePowerToSam
      },
      {
        id: "okie-zone-read-jack",
        front: "OKIE",
        strength: "RIP — Strength Right",
        title: "Okie Rip — Zone Read at Jack",
        focus: "Jack",
        correct: "insideQB",
        question: "Okie Zone Read is at Jack. The tackle zone blocks and the QB can pull. What is Jack’s reaction?",
        explanation: "Correct. Jack is off the ball. He boxes the ball back inside and plays the inside point of the QB if the QB pulls.",
        choices: [
          { id: "insideQB", text: "Box the ball back inside and play the inside point of the QB on pull." },
          { id: "chaseGive", text: "Chase the zone give immediately and ignore QB pull." },
          { id: "spillPuller", text: "Wrong-arm a puller and turn vertical." },
          { id: "carry2", text: "Carry #2 vertically because #2 released." }
        ],
        draw: drawOkieZoneReadJack
      },
      {
        id: "under-zone-read-jack-los",
        front: "UNDER",
        strength: "LIZ — Strength Left",
        title: "Under Liz — Zone Read at Jack",
        focus: "Jack",
        correct: "outsideQB",
        question: "Under Zone Read is at Jack on the LOS in a weak 5-tech. What is his reaction?",
        explanation: "Correct. Jack is a 5-tech in Under, so he plays like the End: squeeze, stay square, maintain outside leverage on the QB, and do not chase the give.",
        choices: [
          { id: "outsideQB", text: "Squeeze, stay square, maintain outside leverage on QB, and do not chase the give." },
          { id: "boxPuller", text: "Box a kickout block even though no puller is coming." },
          { id: "cutbackNow", text: "Immediately shuffle to cutback without honoring QB pull." },
          { id: "deepDrop", text: "Drop deep under #2 because the tackle blocked down." }
        ],
        draw: drawUnderZoneReadJack
      },
      {
        id: "okie-outside-zone-sam",
        front: "OKIE",
        strength: "LIZ — Strength Left",
        title: "Okie Liz — Outside Zone to Sam",
        focus: "Sam",
        correct: "edge",
        question: "Outside Zone is coming to Sam. His key shows outside hat and numbers moving wide. What is Sam’s reaction?",
        explanation: "Correct. Sam adjusts course to maintain outside leverage, gets to the LOS or just beyond, sets a hard edge, and minimizes the vertical seam.",
        choices: [
          { id: "edge", text: "Maintain outside leverage, get to the LOS, set hard edge, and shrink the vertical seam." },
          { id: "spill", text: "Wrong-arm the first puller and turn vertical in B-gap." },
          { id: "cutback", text: "Slow shuffle for cutback immediately because flow is away." },
          { id: "rush", text: "Convert directly to pass rush because outside zone is high hat." }
        ],
        draw: drawOkieOutsideZoneSam
      },
      {
        id: "under-high-hat-jack",
        front: "UNDER",
        strength: "RIP — Strength Right",
        title: "Under Rip — High Hat at Jack",
        focus: "Jack",
        correct: "containRush",
        question: "Jack is on the LOS in Under. His tackle shows high hat/pass set. What is Jack’s reaction?",
        explanation: "Correct. Under Jack on the LOS is a contain rusher. He rushes through his gap, keeps outside contain, and never runs past QB depth.",
        choices: [
          { id: "containRush", text: "Convert to contain rush: rush through your gap, keep outside shoulder, never past QB depth." },
          { id: "open2", text: "Open to #2 and wall #2 because all Jack alignments are coverage first." },
          { id: "wrongArm", text: "Wrong-arm the imaginary puller and close B-gap." },
          { id: "cutback", text: "Shuffle cutback because high hat means ball away." }
        ],
        draw: drawUnderHighHatJack
      },
      {
        id: "okie-high-hat-sam",
        front: "OKIE",
        strength: "RIP — Strength Right",
        title: "Okie Rip — High Hat at Sam",
        focus: "Sam",
        correct: "coverage",
        question: "Sam is off the ball 4x4 in Okie. He gets high hat/pass from his key. What is Sam’s reaction?",
        explanation: "Correct. Off-ball Sam enters coverage rules: open to #2, feel #2, see #1, wall/carry #2, then square and look for work.",
        choices: [
          { id: "coverage", text: "Open to #2, feel #2, see #1, wall/carry #2, then square and look for work." },
          { id: "containRush", text: "Rush contain because Sam is always a rush player." },
          { id: "spill", text: "Wrong-arm the tackle and turn vertical." },
          { id: "chase", text: "Chase the QB immediately with no coverage responsibility." }
        ],
        draw: drawOkieHighHatSam
      },
      {
        id: "under-counter-to-jack",
        front: "UNDER",
        strength: "RIP — Strength Right",
        title: "Under Rip — Counter Weak to Jack",
        focus: "Jack",
        correct: "spillSecond",
        question: "Counter is coming to Jack on the LOS. He gets down block and puller. What is his reaction?",
        explanation: "Correct. Jack flattens with the down block, wrong-arms/spills the first puller, closes the gap, then turns vertical to take out the second puller.",
        choices: [
          { id: "spillSecond", text: "Flatten, wrong-arm/spill first puller, close the gap, then turn vertical for the second puller." },
          { id: "box", text: "Box the puller outside and keep widening." },
          { id: "zoneQB", text: "Slow play the QB only because this is zone read." },
          { id: "coverage", text: "Open to #2 because pullers indicate pass." }
        ],
        draw: drawUnderCounterToJack
      },
      {
        id: "okie-ball-away-jack-cutback",
        front: "OKIE",
        strength: "LIZ — Strength Left",
        title: "Okie Liz — Ball Away From Jack",
        focus: "Jack",
        correct: "lateContain",
        question: "In Okie, ball flows away from Jack and there is no C-gap player to his side. What is Jack’s reaction?",
        explanation: "Correct. With no C-gap player in Okie, Jack does not over-chase cutback. He holds leverage, plays late pursuit/contain, and is ready for boot, reverse, or QB pull.",
        choices: [
          { id: "lateContain", text: "Hold leverage and play late pursuit/contain; be ready for boot, reverse, or QB pull." },
          { id: "fastCutback", text: "Sprint immediately to the backside A-gap." },
          { id: "spill", text: "Wrong-arm the puller even though the ball is away." },
          { id: "flatDrop", text: "Drop to the flat because all ball-away reads are pass." }
        ],
        draw: drawOkieBallAwayJack
      }
    ];

    let order = [];
    let currentIndex = 0;
    let correctCount = 0;
    let answeredCount = 0;
    let locked = false;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startGame() {
      order = shuffle(scenarios);
      currentIndex = 0;
      correctCount = 0;
      answeredCount = 0;
      locked = false;
      document.getElementById("qTotal").textContent = order.length;
      document.getElementById("completeBox").style.display = "none";
      loadScenario();
    }

    function restartGame() {
      startGame();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function loadScenario() {
      locked = false;

      const s = order[currentIndex];
      document.getElementById("qNum").textContent = currentIndex + 1;
      updateAccuracy();
      document.getElementById("scenarioTitle").textContent = s.title;
      document.getElementById("questionText").textContent = s.question;
      document.getElementById("feedback").textContent = "";
      document.getElementById("feedback").className = "feedback";

      drawScenario(s);
      renderChoices(s);
    }

    function renderChoices(s) {
      const choices = shuffle(s.choices);
      const box = document.getElementById("choices");
      box.innerHTML = "";

      choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = choice.text;
        btn.onclick = () => submitAnswer(choice.id);
        box.appendChild(btn);
      });
    }

    function drawScenario(s) {
      clearField();

      document.getElementById("frontTitle").textContent = s.front;
      document.getElementById("strengthTitle").textContent = s.strength;

      drawOffenseBase();

      if (s.front === "UNDER") {
        drawUnder(s.strength.startsWith("RIP"), s.focus);
      } else {
        drawOkie(s.strength.startsWith("RIP"), s.focus);
      }

      s.draw();
    }

    function clearField() {
      [...field.querySelectorAll(".player, .tag, .read-label")].forEach(el => el.remove());
      [...svg.querySelectorAll("path, line, polyline")].forEach(el => el.remove());
    }

    function drawOffenseBase() {
      addPlayer("X", 205, 215, "off");
      addPlayer("LT", 390, 260, "off");
      addPlayer("LG", 470, 260, "off");
      addPlayer("C", 590, 260, "off");
      addPlayer("RG", 710, 260, "off");
      addPlayer("RT", 790, 260, "off");
      addPlayer("Y", 900, 215, "off");
      addPlayer("QB", 590, 170, "off");
      addPlayer("RB", 590, 105, "off");
    }

    function drawUnder(strengthRight, focus) {
      if (strengthRight) {
        addPlayer("E", 825, 305, "def", focus === "End");
        addTag("5 strong", 825, 340);

        addPlayer("N", 625, 305, "def");
        addTag("shade strong", 625, 340);

        addPlayer("T", 430, 305, "def");
        addTag("3 weak", 430, 340);

        addPlayer("J", 355, 305, "def", focus === "Jack");
        addTag("5 weak", 355, 340);

        addPlayer("S", 910, 370, "def", focus === "Sam");
        addTag("off ball", 910, 407);
      } else {
        addPlayer("E", 355, 305, "def", focus === "End");
        addTag("5 strong", 355, 340);

        addPlayer("N", 555, 305, "def");
        addTag("shade strong", 555, 340);

        addPlayer("T", 750, 305, "def");
        addTag("3 weak", 750, 340);

        addPlayer("J", 825, 305, "def", focus === "Jack");
        addTag("5 weak", 825, 340);

        addPlayer("S", 270, 370, "def", focus === "Sam");
        addTag("off ball", 270, 407);
      }

      addPlayer("M", 535, 385, "def");
      addPlayer("W", 645, 385, "def");
      addPlayer("SS", 360, 485, "def");
      addPlayer("FS", 820, 485, "def");
    }

    function drawOkie(strengthRight, focus) {
      if (strengthRight) {
        addPlayer("E", 825, 305, "def");
        addTag("5 strong", 825, 340);

        addPlayer("N", 625, 305, "def");
        addTag("shade strong", 625, 340);

        addPlayer("T", 430, 305, "def");
        addTag("4i weak", 430, 340);

        addPlayer("S", 910, 370, "def", focus === "Sam");
        addTag("4 x 4", 910, 407);

        addPlayer("J", 270, 370, "def", focus === "Jack");
        addTag("4 x 4", 270, 407);
      } else {
        addPlayer("E", 355, 305, "def");
        addTag("5 strong", 355, 340);

        addPlayer("N", 555, 305, "def");
        addTag("shade strong", 555, 340);

        addPlayer("T", 750, 305, "def");
        addTag("4i weak", 750, 340);

        addPlayer("S", 270, 370, "def", focus === "Sam");
        addTag("4 x 4", 270, 407);

        addPlayer("J", 910, 370, "def", focus === "Jack");
        addTag("4 x 4", 910, 407);
      }

      addPlayer("M", 535, 385, "def");
      addPlayer("W", 645, 385, "def");
      addPlayer("SS", 360, 485, "def");
      addPlayer("FS", 820, 485, "def");
    }

    function drawUnderPowerToJack() {

    function addPlayer(label, x, y, type, focus = false) {
      const el = document.createElement("div");
      el.className = "player " + type + (focus ? " focus" : "");
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.textContent = label;
      field.appendChild(el);
    }

    function addTag(text, x, y) {
      const el = document.createElement("div");
      el.className = "tag";
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.textContent = text;
      field.appendChild(el);
    }

    function addReadLabel(text, x, y) {
      const el = document.createElement("div");
      el.className = "read-label";
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.textContent = text;
      field.appendChild(el);
    }

    function drawPath(x1, y1, x2, y2, cls) {
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", `M ${x1} ${y1} L ${x2} ${y2}`);
      path.setAttribute("class", cls);
      svg.appendChild(path);
    }

    function submitAnswer(choice) {
      if (locked) return;
      locked = true;

      const s = order[currentIndex];
      const feedback = document.getElementById("feedback");

      answeredCount++;

      if (choice === s.correct) {
        correctCount++;
        feedback.className = "feedback correct";
        feedback.textContent = s.explanation;

        setTimeout(() => {
          currentIndex++;
          if (currentIndex >= order.length) {
            endGame();
          } else {
            loadScenario();
          }
        }, 5000);
      } else {
        feedback.className = "feedback incorrect";
        feedback.textContent = "Not yet. Re-read the key movement and match the reaction to the play-side or backside responsibility.";
        locked = false;
      }

      updateAccuracy();
    }

    function updateAccuracy() {
      document.getElementById("accuracy").textContent =
        answeredCount === 0 ? 100 : Math.round((correctCount / answeredCount) * 100);
    }

    function endGame() {
      document.getElementById("completeBox").style.display = "block";
      document.getElementById("finalScore").textContent =
        `Final Accuracy: ${Math.round((correctCount / answeredCount) * 100)}%`;
    }

    startGame();
  </script>
