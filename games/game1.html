<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Game 1 — Sam & Jack Block Read Trainer</title>

<style>
:root{
  --bg:#07111f;
  --field:#182337;
  --text:#f8fafc;
  --muted:#b8c4d6;
  --red:#ef4444;
  --green:#33d17a;
  --blue:#4da3ff;
  --yellow:#ffd166;
  --purple:#c084fc;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.wrap{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:22px 0 36px}
header{text-align:center}
.kicker{color:var(--yellow);font-weight:900;text-transform:uppercase;letter-spacing:.08em;font-size:.82rem}
h1{margin:8px 0;font-size:clamp(1.8rem,4vw,3rem)}
.sub{color:var(--muted);max-width:920px;margin:0 auto;line-height:1.45}
.hud{display:flex;justify-content:space-between;margin:18px 0 12px;font-weight:900}
.field{position:relative;height:560px;border-radius:18px;background:var(--field);border:1px solid rgba(255,255,255,.16);overflow:hidden}
.los{position:absolute;left:70px;right:70px;top:260px;border-top:3px solid rgba(255,255,255,.25)}
.front-title{position:absolute;left:22px;top:18px;font-weight:900}
.strength{position:absolute;right:22px;top:18px;font-weight:900;color:var(--yellow)}
.player{position:absolute;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,.75);z-index:8}
.off{background:var(--red)}
.def{background:var(--green);color:#04130a}
.focus{outline:4px solid var(--yellow);box-shadow:0 0 18px rgba(255,209,102,.8)}
.tag,.read-label{position:absolute;transform:translate(-50%,-50%);font-size:.72rem;font-weight:900;z-index:12;white-space:nowrap}
.tag{color:var(--muted)}
.read-label{background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.18);padding:6px 9px;border-radius:999px;color:white}
svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5}
.block-line{stroke:var(--red);stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowRed)}
.ball-line{stroke:var(--purple);stroke-width:5;fill:none;stroke-dasharray:8 7;stroke-linecap:round;marker-end:url(#arrowPurple)}
.sam-line{stroke:var(--yellow);stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowYellow)}
.jack-line{stroke:var(--blue);stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowBlue)}
.draw{stroke-dasharray:700;stroke-dashoffset:700;animation:drawLine 1.2s ease forwards}
@keyframes drawLine{to{stroke-dashoffset:0}}
.question-card{margin-top:16px;padding:18px;border-radius:18px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.055);text-align:center}
.scenario-title{color:var(--yellow);font-weight:900;text-transform:uppercase;margin-bottom:8px}
.question{font-size:1.15rem;font-weight:900;margin-bottom:14px;line-height:1.35}
.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:1000px;margin:0 auto}
button{min-height:66px;border:1px solid rgba(255,255,255,.14);border-radius:14px;background:#34495e;color:white;font-weight:900;cursor:pointer;padding:10px;line-height:1.25}
button:hover{filter:brightness(1.12)}
button:disabled{opacity:.55}
.feedback{min-height:84px;margin-top:14px;font-weight:800;line-height:1.45;color:var(--muted)}
.correct{color:var(--green)}
.incorrect{color:#ff8a8a}
.complete{display:none;margin-top:16px;padding:18px;border-radius:18px;background:rgba(51,209,122,.12);border:1px solid rgba(51,209,122,.35);text-align:center}
@media(max-width:760px){.field{height:500px}.choices{grid-template-columns:1fr}.player{width:36px;height:36px;font-size:.64rem}}
</style>
</head>

<body>
<div class="wrap">

<header>
  <div class="kicker">Legend Mastery Series • Sam & Jack Trainer</div>
  <h1>Game 1 — Block Read Reaction Trainer</h1>
  <p class="sub">
    Read the block shown to Sam and Jack. Both sides are labeled first. Sam/Jack reaction lines appear only after the correct answer.
  </p>
</header>

<section class="hud">
  <div>Question: <span id="qNum">1</span>/<span id="qTotal">16</span></div>
  <div>Accuracy: <span id="accuracy">100</span>%</div>
</section>

<section class="field" id="field">
  <div class="front-title" id="frontTitle"></div>
  <div class="strength" id="strengthTitle"></div>
  <div class="los"></div>

  <svg id="svg" viewBox="0 0 1180 560" preserveAspectRatio="none">
    <defs>
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"></path>
      </marker>
      <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#c084fc"></path>
      </marker>
      <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#ffd166"></path>
      </marker>
      <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#4da3ff"></path>
      </marker>
    </defs>
  </svg>
</section>

<section class="question-card">
  <div class="scenario-title" id="scenarioTitle"></div>
  <div class="question" id="questionText"></div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
</section>

<section class="complete" id="completeBox">
  <h2>Game Complete</h2>
  <p id="finalScore"></p>
  <button onclick="restartGame()">Restart Game</button>
</section>

</div>

<script>
const field = document.getElementById("field");
const svg = document.getElementById("svg");

const scenarios = [
  makeScenario("UNDER", "RIP", "Under Rip — Jack Down With Puller", "Down + Puller", "Base / Gap-Hinge", "spill", "slowCutback"),
  makeScenario("UNDER", "LIZ", "Under Liz — Jack Down Without Puller", "Down — No Puller", "Zone Away", "squeezeQB", "slowCutback"),
  makeScenario("UNDER", "RIP", "Under Rip — Jack Base/Out", "Base / Out", "Pull Away", "setEdge", "slowCutback"),
  makeScenario("UNDER", "LIZ", "Under Liz — Jack Zone", "Zone", "Base / Out", "squeezeQB", "setEdge"),
  makeScenario("UNDER", "RIP", "Under Rip — Jack High Hat", "High Hat", "High Hat", "containRush", "coverage"),
  makeScenario("UNDER", "LIZ", "Under Liz — Sam Base/Out", "Zone Away", "Base / Out", "slowCutback", "setEdge"),
  makeScenario("UNDER", "RIP", "Under Rip — Sam Down With Puller", "Base / Out", "Down + Puller", "setEdge", "box"),
  makeScenario("UNDER", "LIZ", "Under Liz — Sam High Hat / Jack High Hat", "High Hat", "High Hat", "containRush", "coverage"),

  makeScenario("OKIE", "RIP", "Okie Rip — Jack Down With Puller", "Down + Puller", "Base / Out", "box", "slowCutback"),
  makeScenario("OKIE", "LIZ", "Okie Liz — Jack Down Without Puller", "Down — No Puller", "Zone Away", "lateContain", "slowCutback"),
  makeScenario("OKIE", "RIP", "Okie Rip — Jack Zone To Him", "Zone", "Pull Away", "boxQB", "slowCutback"),
  makeScenario("OKIE", "LIZ", "Okie Liz — Jack Base/Out", "Base / Out", "Zone Away", "setEdge", "slowCutback"),
  makeScenario("OKIE", "RIP", "Okie Rip — Sam Down With Puller", "Zone Away", "Down + Puller", "slowCutback", "box"),
  makeScenario("OKIE", "LIZ", "Okie Liz — Sam Zone To Him", "Base / Out", "Zone", "setEdge", "forceBounce"),
  makeScenario("OKIE", "RIP", "Okie Rip — Sam High Hat / Jack High Hat", "High Hat", "High Hat", "coverage", "coverage"),
  makeScenario("OKIE", "LIZ", "Okie Liz — Jack Ball Away / No C-Gap Player", "Zone Away", "Down — No Puller", "lateContain", "slowCutback")
];

let order = [];
let current = 0;
let correct = 0;
let attempts = 0;
let locked = false;

function makeScenario(front, strength, title, jackBlock, samBlock, jackReaction, samReaction) {
  return {
    front,
    strength,
    title,
    jackBlock,
    samBlock,
    jackReaction,
    samReaction,
    correct: reactionText(jackReaction, samReaction),
    question: `Jack gets ${jackBlock}. Sam gets ${samBlock}. What should both players do?`
  };
}

function reactionText(jackReaction, samReaction) {
  return `Jack: ${reactionLabel(jackReaction)} | Sam: ${reactionLabel(samReaction)}`;
}

function reactionLabel(r) {
  const map = {
    spill: "flatten, wrong-arm/spill, then turn vertical into B-gap",
    squeezeQB: "squeeze, stay square, play QB/outside leverage, do not chase give",
    setEdge: "attack leverage point just outside OT, set hard edge, keep outside arm free",
    containRush: "short first step, convert to contain rush, never past QB depth",
    coverage: "short step to LOS, open, then gain depth into coverage",
    box: "attack leverage point just outside OT, box kickout, force ball back inside",
    slowCutback: "read steps, confirm ball away, slow cutback with square shoulders",
    lateContain: "hold leverage, late pursuit/contain for boot, reverse, QB pull",
    boxQB: "box ball back inside and play inside point of QB",
    forceBounce: "maintain outside leverage and force bounce/edge fit"
  };
  return map[r];
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startGame(){
  order = shuffle(scenarios);
  current = 0;
  correct = 0;
  attempts = 0;
  locked = false;
  document.getElementById("qTotal").textContent = order.length;
  document.getElementById("completeBox").style.display = "none";
  loadScenario();
}

function restartGame(){
  startGame();
  window.scrollTo({top:0,behavior:"smooth"});
}

function loadScenario(){
  locked = false;
  const s = order[current];
  clearField();

  document.getElementById("qNum").textContent = current + 1;
  document.getElementById("frontTitle").textContent = s.front;
  document.getElementById("strengthTitle").textContent = `${s.strength} — ${s.strength === "RIP" ? "Strength Right" : "Strength Left"}`;
  document.getElementById("scenarioTitle").textContent = s.title;
  document.getElementById("questionText").textContent = s.question;
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "feedback";

  updateAccuracy();
  drawOffense();
  if(s.front === "UNDER") drawUnder(s.strength === "RIP");
  if(s.front === "OKIE") drawOkie(s.strength === "RIP");

  drawBlocks(s);
  renderChoices(s);
}

function clearField(){
  [...field.querySelectorAll(".player,.tag,.read-label")].forEach(e => e.remove());
  [...svg.querySelectorAll("path")].forEach(e => e.remove());
}

function drawOffense(){
  addPlayer("X",205,215,"off");
  addPlayer("LT",390,260,"off");
  addPlayer("LG",470,260,"off");
  addPlayer("C",590,260,"off");
  addPlayer("RG",710,260,"off");
  addPlayer("RT",790,260,"off");
  addPlayer("Y",900,215,"off");
  addPlayer("QB",590,170,"off");
  addPlayer("RB",590,105,"off");
}

function drawUnder(rip){
  if(rip){
    addPlayer("E",825,305,"def"); label("5 strong",825,340,"tag");
    addPlayer("N",625,305,"def"); label("shade strong",625,340,"tag");
    addPlayer("T",430,305,"def"); label("3 weak",430,340,"tag");
    addPlayer("J",355,305,"def focus"); label("5 weak",355,340,"tag");
    addPlayer("S",910,370,"def focus"); label("off ball",910,407,"tag");
  } else {
    addPlayer("E",355,305,"def"); label("5 strong",355,340,"tag");
    addPlayer("N",555,305,"def"); label("shade strong",555,340,"tag");
    addPlayer("T",750,305,"def"); label("3 weak",750,340,"tag");
    addPlayer("J",825,305,"def focus"); label("5 weak",825,340,"tag");
    addPlayer("S",270,370,"def focus"); label("off ball",270,407,"tag");
  }
  addPlayer("M",535,385,"def");
  addPlayer("W",645,385,"def");
  addPlayer("SS",360,485,"def");
  addPlayer("FS",820,485,"def");
}

function drawOkie(rip){
  if(rip){
    addPlayer("E",825,305,"def"); label("5 strong",825,340,"tag");
    addPlayer("N",625,305,"def"); label("shade strong",625,340,"tag");
    addPlayer("T",430,305,"def"); label("4i weak",430,340,"tag");
    addPlayer("J",270,370,"def focus"); label("4 x 4",270,407,"tag");
    addPlayer("S",910,370,"def focus"); label("4 x 4",910,407,"tag");
  } else {
    addPlayer("E",355,305,"def"); label("5 strong",355,340,"tag");
    addPlayer("N",555,305,"def"); label("shade strong",555,340,"tag");
    addPlayer("T",750,305,"def"); label("4i weak",750,340,"tag");
    addPlayer("J",910,370,"def focus"); label("4 x 4",910,407,"tag");
    addPlayer("S",270,370,"def focus"); label("4 x 4",270,407,"tag");
  }
  addPlayer("M",535,385,"def");
  addPlayer("W",645,385,"def");
  addPlayer("SS",360,485,"def");
  addPlayer("FS",820,485,"def");
}

function positions(s){
  const rip = s.strength === "RIP";
  if(rip){
    return {
      jackOT:{x:390,y:260,dir:-1}, samOT:{x:790,y:260,dir:1},
      jack:{x:s.front==="UNDER"?355:270,y:s.front==="UNDER"?305:370},
      sam:{x:910,y:370},
      jackEdge:{x:350,y:255}, samEdge:{x:875,y:255}
    };
  }
  return {
    jackOT:{x:790,y:260,dir:1}, samOT:{x:390,y:260,dir:-1},
    jack:{x:s.front==="UNDER"?825:910,y:s.front==="UNDER"?305:370},
    sam:{x:270,y:370},
    jackEdge:{x:830,y:255}, samEdge:{x:305,y:255}
  };
}

function drawBlocks(s){
  const p = positions(s);
  drawBlockAt(p.jackOT, s.jackBlock, "Jack key: " + s.jackBlock);
  drawBlockAt(p.samOT, s.samBlock, "Sam key: " + s.samBlock);
  path(590,105, s.strength==="RIP" ? 405 : 775, 165, "ball-line");
}

function drawBlockAt(key, block, text){
  const d = key.dir;
  if(block === "Down + Puller"){
    path(key.x,key.y,key.x-d*72,key.y+10,"block-line");
    path(key.x + d*80,key.y,key.x-d*55,key.y+62,"block-line");
  } else if(block === "Down — No Puller"){
    path(key.x,key.y,key.x-d*75,key.y+10,"block-line");
  } else if(block === "Zone"){
    path(key.x,key.y,key.x+d*58,key.y-8,"block-line");
  } else if(block === "Zone Away"){
    path(key.x,key.y,key.x-d*55,key.y-6,"block-line");
  } else if(block === "Base / Out"){
    path(key.x,key.y,key.x+d*68,key.y+4,"block-line");
  } else if(block === "Pull Away"){
    path(key.x,key.y,key.x-d*130,key.y+18,"block-line");
  } else if(block === "High Hat"){
    path(key.x,key.y,key.x,key.y-62,"block-line");
  } else if(block === "Base / Gap-Hinge"){
    path(key.x,key.y,key.x+d*45,key.y+4,"block-line");
    path(key.x+d*45,key.y+4,key.x+d*78,key.y+28,"block-line");
  }
  label(text, key.x + d*88, key.y-34, "read-label");
}

function renderChoices(s){
  const box = document.getElementById("choices");
  box.innerHTML = "";

  const choices = shuffle([
    s.correct,
    "Jack: wrong-arm/spill every block | Sam: blitz C-gap",
    "Jack: chase the RB immediately | Sam: drop straight back",
    "Jack: widen outside the TE | Sam: run over the top fast"
  ]);

  choices.forEach(choice=>{
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => submitAnswer(choice, s);
    box.appendChild(btn);
  });
}

function submitAnswer(choice, s){
  if(locked) return;
  attempts++;

  if(choice !== s.correct){
    document.getElementById("feedback").className = "feedback incorrect";
    document.getElementById("feedback").textContent = "Not yet. Read the label on each side first: Jack’s block and Sam’s block tell them what to do.";
    updateAccuracy();
    return;
  }

  locked = true;
  correct++;
  [...document.querySelectorAll("#choices button")].forEach(b=>b.disabled=true);

  drawReactions(s);

  const fb = document.getElementById("feedback");
  fb.className = "feedback correct";
  fb.textContent = explain(s);

  updateAccuracy();

  setTimeout(()=>{
    current++;
    if(current >= order.length) endGame();
    else loadScenario();
  }, 6500);
}

function drawReactions(s){
  const p = positions(s);
  drawReaction("jack", p.jack, p.jackEdge, s.jackReaction);
  drawReaction("sam", p.sam, p.samEdge, s.samReaction);
}

function drawReaction(who, start, edge, reaction){
  const cls = who === "jack" ? "jack-line draw" : "sam-line draw";
  const name = who === "jack" ? "Jack" : "Sam";

  if(reaction === "setEdge" || reaction === "box" || reaction === "forceBounce"){
    path(start.x,start.y,edge.x,edge.y,cls);
    label(`${name}: leverage point / set edge`,edge.x,edge.y-25,"read-label");
  }

  if(reaction === "spill"){
    path(start.x,start.y,start.x + (edge.x>start.x?55:-55),start.y,""+cls);
    path(start.x + (edge.x>start.x?55:-55),start.y,edge.x,edge.y,""+cls);
    path(edge.x,edge.y,edge.x,edge.y-58,""+cls);
    label(`${name}: spill → vertical B`,edge.x,edge.y-74,"read-label");
  }

  if(reaction === "squeezeQB"){
    path(start.x,start.y,edge.x,edge.y,cls);
    path(edge.x,edge.y,edge.x + (edge.x>590?-35:35),edge.y-38,cls);
    label(`${name}: squeeze / QB leverage`,edge.x,edge.y-56,"read-label");
  }

  if(reaction === "slowCutback"){
    path(start.x,start.y,start.x + (start.x>590?-55:55),start.y-15,cls);
    label(`${name}: slow cutback`,start.x + (start.x>590?-70:70),start.y-35,"read-label");
  }

  if(reaction === "lateContain"){
    path(start.x,start.y,start.x + (start.x>590?-22:22),start.y-34,cls);
    label(`${name}: hold / late contain`,start.x + (start.x>590?-35:35),start.y-55,"read-label");
  }

  if(reaction === "boxQB"){
    path(start.x,start.y,edge.x,edge.y,cls);
    path(edge.x,edge.y,edge.x + (edge.x>590?-45:45),edge.y-35,cls);
    label(`${name}: box inside / QB`,edge.x,edge.y-55,"read-label");
  }

  if(reaction === "containRush"){
    path(start.x,start.y,edge.x,edge.y,cls);
    path(edge.x,edge.y,edge.x + (edge.x>590?-25:25),edge.y-68,cls);
    label(`${name}: contain rush`,edge.x,edge.y-86,"read-label");
  }

  if(reaction === "coverage"){
    path(start.x,start.y,edge.x,edge.y,cls);
    path(edge.x,edge.y,edge.x + (edge.x>590?-45:45),edge.y-70,cls);
    label(`${name}: step to LOS → open/depth`,edge.x,edge.y-90,"read-label");
  }
}

function explain(s){
  return `${s.correct}. This matches the trainer rule: identify the helmet/shoulder block first, then react immediately. Down with puller creates spill/box rules by alignment. Zone and base/out attack the leverage point. High hat sends on-the-line Jack to contain rush and off-ball Sam/Jack into coverage.`;
}

function updateAccuracy(){
  document.getElementById("accuracy").textContent = attempts === 0 ? 100 : Math.round((correct/attempts)*100);
}

function endGame(){
  document.getElementById("completeBox").style.display = "block";
  document.getElementById("finalScore").textContent = `Final Accuracy: ${Math.round((correct/attempts)*100)}%`;
}

function addPlayer(txt,x,y,cls){
  const el = document.createElement("div");
  el.className = "player " + cls;
  el.style.left = x + "px";
  el.style.top = y + "px";
  el.textContent = txt;
  field.appendChild(el);
}

function label(txt,x,y,cls){
  const el = document.createElement("div");
  el.className = cls;
  el.style.left = x + "px";
  el.style.top = y + "px";
  el.textContent = txt;
  field.appendChild(el);
}

function path(x1,y1,x2,y2,cls){
  const p = document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d",`M ${x1} ${y1} L ${x2} ${y2}`);
  p.setAttribute("class",cls);
  svg.appendChild(p);
}

startGame();
</script>
</body>
</html>
