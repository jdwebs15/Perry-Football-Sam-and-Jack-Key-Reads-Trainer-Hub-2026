<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Game 1 — Key Read Reaction Trainer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{text-align:center}

.field{
  position:relative;
  height:520px;
  background:#1c2538;
  border-radius:14px;
  margin:20px 0;
}

.player{
  position:absolute;
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:bold;
  transform:translate(-50%,-50%);
}

.off{background:#e74c3c;}
.def{background:#2ecc71;color:#000;}

svg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.line{
  stroke:#e74c3c;
  stroke-width:4;
  fill:none;
}

.react{
  stroke:#4da3ff;
  stroke-width:4;
  fill:none;
  stroke-dasharray:400;
  stroke-dashoffset:400;
  animation:draw 1s forwards;
}

.react2{
  stroke:#ffd166;
  stroke-width:4;
  fill:none;
  stroke-dasharray:400;
  stroke-dashoffset:400;
  animation:draw 1s forwards;
}

@keyframes draw{
  to{stroke-dashoffset:0}
}

.label{
  position:absolute;
  background:#000a;
  padding:4px 6px;
  border-radius:6px;
  font-size:12px;
}

.question{
  text-align:center;
  font-size:18px;
  margin:10px 0;
}

.choices{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:#34495e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.feedback{
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}

</style>
</head>

<body>
<div class="wrap">

<h1>Sam & Jack Reaction Trainer</h1>

<div class="field" id="field"></div>

<div class="question" id="question"></div>

<div class="choices" id="choices"></div>

<div class="feedback" id="feedback"></div>

</div>

<script>
const field = document.getElementById("field");
const feedback = document.getElementById("feedback");

const scenarios = [
{
  question:"Jack gets DOWN + PULLER. Sam gets PULL AWAY / GAP-HINGE. What do they do?",
  correct:"A",

  choices:{
    A:"Jack spills + vertical B-gap | Sam slow cutback",
    B:"Jack boxes | Sam blitzes",
    C:"Jack chases RB | Sam drops",
    D:"Both drop"
  },

  drawBlocks:()=>{
    line(400,260,450,260);
    label("Down Block",450,260);

    line(450,260,320,320);
    label("Puller",320,320);

    line(800,260,840,260);
    label("Gap-Hinge / Pull Away",860,260);
  },

  drawReaction:()=>{
    react(350,300,420,300);
    react(420,300,450,250);
    label("Jack: Spill → B Gap",460,240);

    react2(850,340,800,330);
    label("Sam: Slow Cutback",790,330);
  }
},

{
  question:"Jack gets OUTSIDE HAT. Sam gets BALL AWAY. What do they do?",
  correct:"A",

  choices:{
    A:"Jack sets edge | Sam slow cutback",
    B:"Jack spills | Sam blitzes",
    C:"Jack drops | Sam drops",
    D:"Jack chases RB"
  },

  drawBlocks:()=>{
    line(800,260,860,260);
    label("Outside Hat / Base",880,260);

    label("Ball Away",300,260);
  },

  drawReaction:()=>{
    react(850,300,900,280);
    label("Jack: Set Edge",910,280);

    react2(300,330,350,320);
    label("Sam: Slow Cutback",360,320);
  }
}
];

let current = 0;

function drawScenario(){
  field.innerHTML = "";
  feedback.innerText = "";

  // OL
  for(let i=0;i<5;i++){
    add("OL",350+i*80,260,"off");
  }

  // DEF
  add("J",850,300,"def");
  add("S",300,340,"def");

  scenarios[current].drawBlocks();

  document.getElementById("question").innerText = scenarios[current].question;

  let cHTML="";
  for(let key in scenarios[current].choices){
    cHTML+=`<button onclick="answer('${key}')">${scenarios[current].choices[key]}</button>`;
  }
  document.getElementById("choices").innerHTML = cHTML;
}

function answer(choice){
  if(choice===scenarios[current].correct){
    feedback.innerText="Correct";
    scenarios[current].drawReaction();

    setTimeout(()=>{
      current++;
      if(current>=scenarios.length){
        document.getElementById("question").innerText="Complete";
        document.getElementById("choices").innerHTML="";
      } else {
        drawScenario();
      }
    },2000);
  } else {
    feedback.innerText="Read the block again";
  }
}

function add(text,x,y,type){
  let d=document.createElement("div");
  d.className="player "+type;
  d.style.left=x+"px";
  d.style.top=y+"px";
  d.innerText=text;
  field.appendChild(d);
}

function line(x1,y1,x2,y2){
  let l=document.createElementNS("http://www.w3.org/2000/svg","line");
  l.setAttribute("x1",x1);
  l.setAttribute("y1",y1);
  l.setAttribute("x2",x2);
  l.setAttribute("y2",y2);
  l.setAttribute("class","line");
  field.appendChild(l);
}

function react(x1,y1,x2,y2){
  let l=document.createElementNS("http://www.w3.org/2000/svg","line");
  l.setAttribute("x1",x1);
  l.setAttribute("y1",y1);
  l.setAttribute("x2",x2);
  l.setAttribute("y2",y2);
  l.setAttribute("class","react");
  field.appendChild(l);
}

function react2(x1,y1,x2,y2){
  let l=document.createElementNS("http://www.w3.org/2000/svg","line");
  l.setAttribute("x1",x1);
  l.setAttribute("y1",y1);
  l.setAttribute("x2",x2);
  l.setAttribute("y2",y2);
  l.setAttribute("class","react2");
  field.appendChild(l);
}

function label(text,x,y){
  let d=document.createElement("div");
  d.className="label";
  d.style.left=x+"px";
  d.style.top=y+"px";
  d.innerText=text;
  field.appendChild(d);
}

drawScenario();
</script>

</body>
</html>
