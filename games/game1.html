<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Game 1 — Sam & Jack Key Read Trainer</title>

  <style>
    :root {
      --bg: #07111f;
      --panel: #101b2d;
      --field: #1a2435;
      --line: rgba(255,255,255,0.16);
      --text: #f8fafc;
      --muted: #b8c4d6;
      --accent: #ff7a18;
      --green: #33d17a;
      --red: #ef4444;
      --blue: #4da3ff;
      --yellow: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #081120, #050913);
      color: var(--text);
    }

    .wrap {
      width: min(1100px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 36px;
    }

    header {
      text-align: center;
      margin-bottom: 16px;
    }

    .kicker {
      color: var(--yellow);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    h1 {
      margin: 8px 0 8px;
      font-size: clamp(1.8rem, 4vw, 3rem);
    }

    .sub {
      margin: 0 auto;
      max-width: 820px;
      color: var(--muted);
      line-height: 1.45;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 12px;
      font-weight: 800;
      color: white;
    }

    .field {
      position: relative;
      height: 510px;
      border-radius: 18px;
      background:
        linear-gradient(90deg, transparent 49.7%, rgba(255,255,255,0.14) 50%, transparent 50.3%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        var(--field);
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 16px 45px rgba(0,0,0,0.28);
    }

    .los {
      position: absolute;
      left: 70px;
      right: 70px;
      top: 230px;
      border-top: 3px solid rgba(255,255,255,0.22);
    }

    .hash {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255,255,255,0.08);
    }

    .hash.left {
      left: 33%;
    }

    .hash.right {
      right: 33%;
    }

    .player {
      position: absolute;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 900;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.75);
      z-index: 5;
    }

    .off {
      background: var(--red);
    }

    .def {
      background: var(--green);
      color: #04130a;
    }

    .focus {
      outline: 4px solid var(--yellow);
      box-shadow: 0 0 20px rgba(255,209,102,0.75);
    }

    .tag {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 0.76rem;
      color: var(--muted);
      font-weight: 900;
      text-align: center;
      z-index: 6;
    }

    .front-title {
      position: absolute;
      left: 22px;
      top: 18px;
      font-weight: 900;
      color: white;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .strength {
      position: absolute;
      right: 22px;
      top: 18px;
      font-weight: 900;
      color: var(--yellow);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
    }

    .arrow-blue {
      stroke: var(--blue);
      stroke-width: 5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrowBlue);
    }

    .arrow-yellow {
      stroke: var(--yellow);
      stroke-width: 5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrowYellow);
    }

    .arrow-red {
      stroke: #ff5b5b;
      stroke-width: 5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrowRed);
    }

    .read-label {
      position: absolute;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(0,0,0,0.46);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      font-size: 0.74rem;
      font-weight: 900;
      transform: translate(-50%, -50%);
      z-index: 8;
      white-space: nowrap;
    }

    .question-card {
      margin-top: 16px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.055);
      text-align: center;
    }

    .question {
      font-size: 1.18rem;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 850px;
      margin: 0 auto;
    }

    button {
      min-height: 52px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      background: #34495e;
      color: white;
      font-weight: 900;
      cursor: pointer;
      font-size: 0.98rem;
    }

    button:hover {
      filter: brightness(1.12);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .feedback {
      min-height: 42px;
      margin-top: 14px;
      font-size: 1rem;
      font-weight: 800;
      color: var(--muted);
    }

    .correct {
      color: var(--green);
    }

    .incorrect {
      color: #ff8a8a;
    }

    .complete {
      margin-top: 16px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(51,209,122,0.12);
      border: 1px solid rgba(51,209,122,0.35);
      display: none;
      text-align: center;
    }

    @media (max-width: 720px) {
      .field {
        height: 440px;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .player {
        width: 36px;
        height: 36px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header>
      <div class="kicker">Legend Mastery Series • Sam & Jack Trainer</div>
      <h1>Game 1 — Key Read Trainer</h1>
      <p class="sub">
        Read the helmet/shoulder action of the tackle or tight end. Identify the key read before reacting:
        Down, Pull, High Hat, or Out/Base.
      </p>
    </header>

    <section class="hud">
      <div>Question: <span id="qNum">1</span>/<span id="qTotal">12</span></div>
      <div>Accuracy: <span id="accuracy">100</span>%</div>
    </section>

    <section class="field" id="field">
      <div class="front-title" id="frontTitle"></div>
      <div class="strength" id="strengthTitle"></div>
      <div class="hash left"></div>
      <div class="hash right"></div>
      <div class="los"></div>

      <svg id="movementLayer" viewBox="0 0 1100 510" preserveAspectRatio="none">
        <defs>
          <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#4da3ff"></path>
          </marker>
          <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#ffd166"></path>
          </marker>
          <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#ff5b5b"></path>
          </marker>
        </defs>
      </svg>
    </section>

    <section class="question-card">
      <div class="question" id="questionText"></div>

      <div class="choices">
        <button onclick="submitAnswer('down')">DOWN BLOCK</button>
        <button onclick="submitAnswer('pull')">PULL AWAY</button>
        <button onclick="submitAnswer('highhat')">HIGH HAT / PASS SET</button>
        <button onclick="submitAnswer('outbase')">OUT / BASE</button>
      </div>

      <div class="feedback" id="feedback"></div>
    </section>

    <section class="complete" id="completeBox">
      <h2>Game Complete</h2>
      <p id="finalScore"></p>
      <button onclick="restartGame()">Restart Game</button>
    </section>

  </div>

  <script>
    const field = document.getElementById("field");
    const svg = document.getElementById("movementLayer");

    const scenarios = [
      {
        front: "UNDER",
        strength: "RIP — Strength Right",
        player: "Jack",
        readKey: "weak tackle",
        key: "down",
        correct: "down",
        prompt: "UNDER Rip: Jack is on the LOS in a weak 5-tech. The weak tackle blocks down inside. What is the key read?"
      },
      {
        front: "UNDER",
        strength: "LIZ — Strength Left",
        player: "Sam",
        readKey: "strong tackle / EMOLS",
        key: "outbase",
        correct: "outbase",
        prompt: "UNDER Liz: Sam is off the ball. The strong tackle shows outside hat and base pressure. What is the key read?"
      },
      {
        front: "OKIE",
        strength: "RIP — Strength Right",
        player: "Sam",
        readKey: "strong tackle / EMOLS",
        key: "pull",
        correct: "pull",
        prompt: "OKIE Rip: Sam is off the ball 4x4. His tackle pulls away from him. What is the key read?"
      },
      {
        front: "UNDER",
        strength: "RIP — Strength Right",
        player: "Jack",
        readKey: "weak tackle",
        key: "highhat",
        correct: "highhat",
        prompt: "UNDER Rip: Jack is on the LOS in a weak 5-tech. The weak tackle pass sets with high hat. What is the key read?"
      },
      {
        front: "OKIE",
        strength: "LIZ — Strength Left",
        player: "Jack",
        readKey: "weak tackle / EMOLS",
        key: "outbase",
        correct: "outbase",
        prompt: "OKIE Liz: Jack is off the ball 4x4. The weak tackle comes out/base at him. What is the key read?"
      },
      {
        front: "UNDER",
        strength: "LIZ — Strength Left",
        player: "Jack",
        readKey: "weak tackle",
        key: "down",
        correct: "down",
        prompt: "UNDER Liz: Jack is on the LOS in a weak 5-tech. The weak tackle blocks down. What is the key read?"
      },
      {
        front: "OKIE",
        strength: "RIP — Strength Right",
        player: "Jack",
        readKey: "weak tackle / EMOLS",
        key: "highhat",
        correct: "highhat",
        prompt: "OKIE Rip: Jack is off the ball 4x4. The weak tackle shows high hat. What is the key read?"
      },
      {
        front: "UNDER",
        strength: "RIP — Strength Right",
        player: "Sam",
        readKey: "strong tackle / EMOLS",
        key: "pull",
        correct: "pull",
        prompt: "UNDER Rip: Sam sees the strong tackle pull away from him. What is the key read?"
      },
      {
        front: "OKIE",
        strength: "LIZ — Strength Left",
        player: "Sam",
        readKey: "strong tackle / EMOLS",
        key: "down",
        correct: "down",
        prompt: "OKIE Liz: Sam is off the ball 4x4. His tackle blocks down inside. What is the key read?"
      },
      {
        front: "UNDER",
        strength: "LIZ — Strength Left",
        player: "Sam",
        readKey: "strong tackle / EMOLS",
        key: "highhat",
        correct: "highhat",
        prompt: "UNDER Liz: Sam sees high hat/pass set from his key. What is the key read?"
      },
      {
        front: "OKIE",
        strength: "RIP — Strength Right",
        player: "Jack",
        readKey: "weak tackle / EMOLS",
        key: "pull",
        correct: "pull",
        prompt: "OKIE Rip: Jack sees the weak tackle pull away. What is the key read?"
      },
      {
        front: "UNDER",
        strength: "RIP — Strength Right",
        player: "Jack",
        readKey: "weak tackle",
        key: "outbase",
        correct: "outbase",
        prompt: "UNDER Rip: Jack is on the LOS. The weak tackle comes out/base at him. What is the key read?"
      }
    ];

    let order = [];
    let currentIndex = 0;
    let correctCount = 0;
    let answeredCount = 0;
    let locked = false;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startGame() {
      order = shuffle(scenarios);
      currentIndex = 0;
      correctCount = 0;
      answeredCount = 0;
      locked = false;
      document.getElementById("qTotal").textContent = order.length;
      document.getElementById("completeBox").style.display = "none";
      loadScenario();
    }

    function restartGame() {
      startGame();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function loadScenario() {
      locked = false;

      const s = order[currentIndex];
      document.getElementById("qNum").textContent = currentIndex + 1;
      document.getElementById("accuracy").textContent = answeredCount === 0 ? 100 : Math.round((correctCount / answeredCount) * 100);
      document.getElementById("questionText").textContent = s.prompt;
      document.getElementById("feedback").textContent = "";
      document.getElementById("feedback").className = "feedback";

      drawFront(s);
    }

    function clearField() {
      [...field.querySelectorAll(".player, .tag, .read-label")].forEach(el => el.remove());
      [...svg.querySelectorAll("path, line, polyline")].forEach(el => el.remove());
    }

    function drawFront(s) {
      clearField();

      document.getElementById("frontTitle").textContent = s.front;
      document.getElementById("strengthTitle").textContent = s.strength;

      const strengthRight = s.strength.startsWith("RIP");

      drawOffense();
      if (s.front === "UNDER") {
        drawUnder(strengthRight, s);
      } else {
        drawOkie(strengthRight, s);
      }

      drawKeyMovement(s, strengthRight);
    }

    function drawOffense() {
      addPlayer("X", 210, 190, "off");
      addPlayer("LT", 390, 230, "off");
      addPlayer("LG", 465, 230, "off");
      addPlayer("C", 550, 230, "off");
      addPlayer("RG", 635, 230, "off");
      addPlayer("RT", 710, 230, "off");
      addPlayer("Y", 810, 190, "off");
      addPlayer("QB", 550, 145, "off");
      addPlayer("RB", 550, 80, "off");
    }

    function drawUnder(strengthRight, s) {
      if (strengthRight) {
        addPlayer("E", 745, 270, "def", isFocus(s, "End"));
        addTag("5 strong", 745, 305);

        addPlayer("N", 575, 270, "def");
        addTag("shade strong", 575, 305);

        addPlayer("T", 430, 270, "def");
        addTag("3 weak", 430, 305);

        addPlayer("J", 355, 270, "def", s.player === "Jack");
        addTag("5 weak", 355, 305);

        addPlayer("S", 820, 345, "def", s.player === "Sam");
        addTag("off ball", 820, 382);
      } else {
        addPlayer("E", 355, 270, "def");
        addTag("5 strong", 355, 305);

        addPlayer("N", 525, 270, "def");
        addTag("shade strong", 525, 305);

        addPlayer("T", 670, 270, "def");
        addTag("3 weak", 670, 305);

        addPlayer("J", 745, 270, "def", s.player === "Jack");
        addTag("5 weak", 745, 305);

        addPlayer("S", 280, 345, "def", s.player === "Sam");
        addTag("off ball", 280, 382);
      }

      addPlayer("M", 500, 350, "def");
      addPlayer("W", 600, 350, "def");
      addPlayer("SS", 330, 435, "def");
      addPlayer("FS", 770, 435, "def");
    }

    function drawOkie(strengthRight, s) {
      if (strengthRight) {
        addPlayer("E", 745, 270, "def");
        addTag("5 strong", 745, 305);

        addPlayer("N", 575, 270, "def");
        addTag("shade strong", 575, 305);

        addPlayer("T", 430, 270, "def");
        addTag("4i weak", 430, 305);

        addPlayer("S", 820, 345, "def", s.player === "Sam");
        addTag("4 x 4", 820, 382);

        addPlayer("J", 320, 345, "def", s.player === "Jack");
        addTag("4 x 4", 320, 382);
      } else {
        addPlayer("E", 355, 270, "def");
        addTag("5 strong", 355, 305);

        addPlayer("N", 525, 270, "def");
        addTag("shade strong", 525, 305);

        addPlayer("T", 670, 270, "def");
        addTag("4i weak", 670, 305);

        addPlayer("S", 280, 345, "def", s.player === "Sam");
        addTag("4 x 4", 280, 382);

        addPlayer("J", 780, 345, "def", s.player === "Jack");
        addTag("4 x 4", 780, 382);
      }

      addPlayer("M", 500, 350, "def");
      addPlayer("W", 600, 350, "def");
      addPlayer("SS", 330, 435, "def");
      addPlayer("FS", 770, 435, "def");
    }

    function drawKeyMovement(s, strengthRight) {
      const keyPoint = getKeyPoint(s, strengthRight);

      if (s.key === "down") {
        drawArrow(keyPoint.x, keyPoint.y, keyPoint.x - keyPoint.dir * 72, keyPoint.y + 18, "arrow-blue");
        addReadLabel("KEY: DOWN BLOCK", keyPoint.x - keyPoint.dir * 45, keyPoint.y + 52);
      }

      if (s.key === "pull") {
        drawArrow(keyPoint.x, keyPoint.y, keyPoint.x - keyPoint.dir * 165, keyPoint.y + 6, "arrow-red");
        addReadLabel("KEY: PULL AWAY", keyPoint.x - keyPoint.dir * 88, keyPoint.y + 42);
      }

      if (s.key === "highhat") {
        drawArrow(keyPoint.x, keyPoint.y, keyPoint.x, keyPoint.y - 72, "arrow-yellow");
        addReadLabel("KEY: HIGH HAT", keyPoint.x, keyPoint.y - 105);
      }

      if (s.key === "outbase") {
        drawArrow(keyPoint.x, keyPoint.y, keyPoint.x + keyPoint.dir * 76, keyPoint.y + 8, "arrow-blue");
        addReadLabel("KEY: OUT / BASE", keyPoint.x + keyPoint.dir * 55, keyPoint.y + 44);
      }
    }

    function getKeyPoint(s, strengthRight) {
      if (s.player === "Sam") {
        return strengthRight
          ? { x: 710, y: 230, dir: 1 }
          : { x: 390, y: 230, dir: -1 };
      }

      return strengthRight
        ? { x: 390, y: 230, dir: -1 }
        : { x: 710, y: 230, dir: 1 };
    }

    function isFocus(s, name) {
      return false;
    }

    function addPlayer(label, x, y, type, focus = false) {
      const el = document.createElement("div");
      el.className = "player " + type + (focus ? " focus" : "");
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.textContent = label;
      field.appendChild(el);
    }

    function addTag(text, x, y) {
      const el = document.createElement("div");
      el.className = "tag";
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.textContent = text;
      field.appendChild(el);
    }

    function addReadLabel(text, x, y) {
      const el = document.createElement("div");
      el.className = "read-label";
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.textContent = text;
      field.appendChild(el);
    }

    function drawArrow(x1, y1, x2, y2, cls) {
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", `M ${x1} ${y1} L ${x2} ${y2}`);
      path.setAttribute("class", cls);
      svg.appendChild(path);
    }

    function submitAnswer(choice) {
      if (locked) return;
      locked = true;

      const s = order[currentIndex];
      const feedback = document.getElementById("feedback");

      answeredCount++;

      if (choice === s.correct) {
        correctCount++;
        feedback.className = "feedback correct";
        feedback.textContent = getCorrectExplanation(s);
      } else {
        feedback.className = "feedback incorrect";
        feedback.textContent = getIncorrectExplanation(s);
        locked = false;
        updateAccuracy();
        return;
      }

      updateAccuracy();

      setTimeout(() => {
        currentIndex++;
        if (currentIndex >= order.length) {
          endGame();
        } else {
          loadScenario();
        }
      }, 5000);
    }

    function updateAccuracy() {
      document.getElementById("accuracy").textContent =
        answeredCount === 0 ? 100 : Math.round((correctCount / answeredCount) * 100);
    }

    function getCorrectExplanation(s) {
      if (s.key === "down") {
        return "Correct. Down block means eyes snap opposite for puller/kickout. Under Jack on the LOS plays this like the End.";
      }

      if (s.key === "pull") {
        return "Correct. Pull away is treated like down-without-puller: square back to QB/read/cutback responsibility.";
      }

      if (s.key === "highhat") {
        return "Correct. High hat means pass. Off-ball Sam/Jack enter coverage rules; Under Jack on the LOS becomes contain rush.";
      }

      return "Correct. Out/Base means set a hard edge, control the block, keep outside arm free, and fight pressure.";
    }

    function getIncorrectExplanation(s) {
      if (s.key === "down") {
        return "Not yet. Watch the tackle’s helmet and shoulders: he is blocking down inside.";
      }

      if (s.key === "pull") {
        return "Not yet. The key is leaving and pulling away from you.";
      }

      if (s.key === "highhat") {
        return "Not yet. The key is showing pass set/high hat.";
      }

      return "Not yet. The key is coming out/base toward you with outside hat pressure.";
    }

    function endGame() {
      document.getElementById("completeBox").style.display = "block";
      document.getElementById("finalScore").textContent =
        `Final Accuracy: ${Math.round((correctCount / answeredCount) * 100)}%`;
    }

    startGame();
  </script>
</body>
</html>
